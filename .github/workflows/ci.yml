name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: types + lint + build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_SECRET: ci-dummy-secret
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - name: Unit tests (seed gating + demo-counselor fail-closed)
        run: npm run test:unit
      - name: ESLint (non-blocking while src lint debt is tracked separately)
        run: npm run lint
        continue-on-error: true
      - run: npm run build

  e2e-rbac:
    name: e2e RBAC leaks
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erudit
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erudit
      NEXTAUTH_SECRET: ci-e2e-secret
      NEXTAUTH_URL: http://localhost:3000
      AUTH_RATE_LIMIT_PER_MIN: 200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx prisma generate
      # Regression-guard: схема НЕ должна уходить вперёд миграций (класс «db push дрейф»).
      # Если schema.prisma изменили без миграции — migrate diff --exit-code вернёт 2 → CI красный.
      - name: Guard — no un-migrated schema drift
        run: |
          node -e "const {Client}=require('pg');(async()=>{const c=new Client({connectionString:'postgresql://postgres:postgres@localhost:5432/postgres'});await c.connect();await c.query('DROP DATABASE IF EXISTS shadow');await c.query('CREATE DATABASE shadow');await c.end()})()"
          npx prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --shadow-database-url postgresql://postgres:postgres@localhost:5432/shadow --exit-code
      # Версионированные миграции вместо db push: свежая CI-БД получает схему через migrate deploy
      # (тот же путь, что и прод/Intellect-инстанс). Доказывает, что миграции применяются чисто.
      - run: npx prisma migrate deploy
      - name: Seeds (order matters — demo requires main seed first)
        # Demo users now live in seed-demo-users.ts and run ONLY under SEED_DEMO=1 with an
        # explicit password env. CI is a demo/test env → enable them so e2e logins keep working.
        env:
          SEED_DEMO: '1'
          SEED_DEMO_PASSWORD: erudit2025
        run: |
          npx tsx prisma/seed.ts
          npx tsx scripts/seed-roles.ts
          npx tsx scripts/seed-demo-users.ts
          npx tsx scripts/seed-demo.ts
      - run: npm run build
      - name: Start app
        run: npx next start -p 3000 &
      - name: Wait for app
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/login >/dev/null 2>&1 && echo "app up" && exit 0
            sleep 2
          done
          echo "app did not start in time" && exit 1
      # --retries=2: setup-логин иногда флейкает под нагрузкой CI (cookie >30s);
      # сами rbac-leaks детерминированы. Ретрай гасит транзиентную флейки.
      - run: npx playwright test e2e/rbac-leaks.spec.ts e2e/withdrawals-branch-scope.spec.ts e2e/fee-invoices-branch-scope.spec.ts e2e/payments-branch-scope.spec.ts e2e/payments-patch-branch-scope.spec.ts e2e/psy-privacy-hotfix.spec.ts e2e/single-school-day.spec.ts --retries=2
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report
            e2e/.report
          retention-days: 7

  onprem-image:
    name: on-prem docker image builds & boots
    runs-on: ubuntu-latest
    # Regression-guard класса «on-prem образ ломается на чистом чекауте»:
    # (1) сборка ловит COPY несуществующих/gitignored файлов; (2) прогон ловит рантайм-дыры
    # (нехватка deps в standalone-runner, миграции не применяются). Оба уже случались.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bilimos
          POSTGRES_PASSWORD: onprempass
          POSTGRES_DB: bilimos
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U bilimos"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Build on-prem image (clean checkout)
        run: docker build -t bilimos-app:ci .
      - name: Boot container (migrate deploy on fresh DB + health)
        run: |
          docker run -d --name app --network host \
            -e DATABASE_URL="postgresql://bilimos:onprempass@localhost:5432/bilimos?schema=public" \
            -e NEXTAUTH_SECRET="ci-onprem-secret-not-real-1234567890" \
            -e NEXTAUTH_URL="http://localhost:3000" -e SEED_DEMO=0 \
            bilimos-app:ci
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || true)
            [ "$code" = "200" ] && { echo "health 200"; break; }
            echo "waiting ($i) health=$code"; sleep 3
          done
          curl -s http://localhost:3000/api/health | grep -q '"database":"connected"' || { echo "health not connected"; docker logs app | tail -40; exit 1; }
      - name: Assert migrations applied via migrate deploy (not db push)
        run: |
          docker logs app 2>&1 | grep -q "migrate deploy" || { echo "predeploy did not run migrate deploy"; docker logs app | tail -40; exit 1; }
          applied=$(docker exec app node -e "const{Client}=require('pg');(async()=>{const c=new Client({connectionString:process.env.DATABASE_URL});await c.connect();const r=await c.query('SELECT count(*)::int n FROM _prisma_migrations WHERE finished_at IS NOT NULL');console.log(r.rows[0].n);await c.end()})()" )
          echo "applied migrations: $applied"
          [ "$applied" -ge 27 ] || { echo "expected >=27 applied migrations, got $applied"; exit 1; }
