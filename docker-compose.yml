services:
  postgres:
    image: postgres:16-alpine
    container_name: erudit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erudit
      POSTGRES_PASSWORD: erudit
      POSTGRES_DB: erudit
    ports:
      - '5433:5432'
    volumes:
      - erudit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erudit -d erudit']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erudit-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - erudit_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: erudit-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - erudit_minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  erudit_pg_data:
  erudit_redis_data:
  erudit_minio_data:
